<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Up Pulsa</title>
    
    <style>
        *{
            padding: 0;
            margin: 0;
            font-family:'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif
        }
        

        .utama{
            width: 100%;
            height: 100vh;
            border: 2px solid aqua;
            
        }

        

        nav{
            width: 100%;
            height: 15vh;
            background-color: red;
             display: flex;
            justify-content: center;
            align-items: center;
            
        }



        nav h1{
           
            color: rgb(255, 255, 255);
        }

        
        

        
        .pembungkusmerah{
            width: 100%;
            height: 85vh;
            border: 2px solid red;
            display: flex;
            justify-content: space-between;
        }
        

        .merahkiri{
             width: 10%;
            height: 85vh;
            background-color: red;
          
            
        }

        .merahkiri2{
             width: 90% ;
            height: 85vh;
            border: 2px solid orange;
        }

       


        input{
            
            height: 30px;
            background-color:rgb(228, 228, 228);
            
            padding: 5px;
        
        }

        button{
            width: 7%;
            height: 8%;
            background-color: rgb(255, 0, 0);
            padding: 6px;
            border-radius: 4px;
            color: white;
        }

        .hargaList{
            width: 30px;
            height: 30px;
        }

        /*axis 38,, 31 */
        /*smartfen 82,81,88,89 */
        /*XL 87,78,77,19,17 */

        
        @media(max-width:667px){
            button{
                width: 20%;
            }
        }

        

    </style>
</head>
<body>
 <div class="utama">

    <div class="bungkus">

    </div>
    

    
    <nav>
    <h1>Top Up Pulsa by Ryu</h1>
    <h4>Sign Out</h4>
    </nav>

    

    <div class="pembungkusmerah">
        <div class="merahkiri"> 
            
    </div>
<div class="merahkiri2">
    
    <h3>Masukan No HP Tujuan</h3>
    <label for="Masukan Nomor HP Tujuan"></label><br>
    <input type="number" id="phone"style="width: 25%;" placeholder="">
    <button>Bayar</button>
    <div id="operatorInfo"></div>
    <div id="hargaList"></div>
    </div>

    </div>
    






    


 
</div>    
    <script>
        const operatorData =[
            {
                name: 'Telkomsel',
                preFixes: ['0852', '0813', '0821', '0823', '0822'],
                harga: [5000,10000,15000,2000,50000,100000]
            },

            {
                name: 'Indosat',
                preFixes: ['0816', '0856', '0855', '0815'],
                harga: [5000,10000,15000,2000,50000,100000]
            },

            {
                name: 'Tri',
                preFixes: ['0897', '0898', '0896', '0895'],
                harga: [5000,10000,15000,2000,50000,100000]
            },

            {
                name: 'Axis',
                preFixes: ['0838', '0831'],
                harga: [5000,10000,15000,2000,50000,100000]
            }

            
        ];

        const phoneInput = document.getElementById('phone');
        const operatorInfo = document.getElementById('operatorInfo');
        const hargaList = document.getElementById('hargaList');
        
        phoneInput.addEventListener('input', function(){
            const nomor = phoneInput.value.trim();
            const prefix = nomor.slice(0, 4);

            let operator = null;

            for (let i = 0; i < operatorData.length; i++){
                if(operatorData[i].preFixes.includes(prefix)){
                    operator = operatorData[i];
                    break;
                }
            }

            if(operator){
                operatorInfo.innerHTML = "Operator Terdeteksi :" + operator.name;
                hargaList.innerHTML = "Daftar Harga :<ul> " + 
                    operator.harga.map(h => `<li>Rp ${h.toLocaleString('id-ID')}</li>`).join('')+"</ul>";  
            }else{
                operatorInfo.innerText = "Operator Tidak Terdeteksi.";
                hargaList.innerHTML = "";
            }
        });
    </script>
</body>
</html>
