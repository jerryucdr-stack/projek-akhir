<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
        }

        .utama{
            width: 100%;
            height: 100%;
            /* border: 2px solid rgb(101, 94, 17); */
        }

        .bks{
            width: 100%;
            height: 11vh;
            /* border: 2px solid blue; */
            display: flex;
            justify-content: center;
            align-items: center;
        }
        

        

        .judul{
            width: 21%;
            height: 11vh;
            background-color: skyblue;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .judul2{
            width: 79%;
            height: 11vh;
            background-color: skyblue;
            display: flex;
            justify-content: right;
            align-items: center;
            color: white;
            /* border: 2px solid red; */
        }

        


        #carousel{
            position: relative;
            width: 100%;
            height: 90vh;
            overflow: hidden;
            margin: auto;
            
        }
        #carousel-bks{
            width: 100%;
            height: 100vh;
            /* border: 2px solid red; */
            display: flex;
            transition: transform 0.5s ease-in-out;
        }
        .slide{
            min-width: 100%;
            object-fit:cover
        }
        #prev, #next{
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            border: none;
            font-size: 4rem;
            padding: 20px;
            cursor: pointer;
            z-index: 99;
            background-color: transparent;
        }
        #prev{
            left: 10px;
        }

        #next{
            right: 10px;
        }

        @media(max-width:667px){
            .bks{
                width: 100%;
                height: 11vh;
            }
        }

    </style>
</head>
<body>
    <div class="utama">

    
    

    <div class="bks">
     <div class="judul">
     <h2>Store.app</h2>
     
     </div>

     <div class="judul2">
        <h3>Home    Product     Gallery</h3>
     
     </div>
    </div>

        
    

    

    <div id="carousel">
        <button id="prev">⏮️</button>

        <div id="carousel-bks">
            <img src="RobloxScreenShot20250322_222410482.png" alt="banner 1" class="slide">
            <img src="RobloxScreenShot20250816_204238290.png" alt="banner 2" class="slide">
            <img src="fisch.png" alt="banner 3" class="slide">
        </div>

        <button id="next">⏭️</button>
    </div>

</div>    

</div>


    <script>
        const slide = document.querySelectorAll('.slide');
        const bks = document.getElementById('carousel-bks');
        const nextBtn = document.getElementById('next');
        const prevBtn = document.getElementById('prev');

        let currentIndex = 0;

        function showSlide(index){
            bks.style.transform = `translateX(-${index * 100}%)`;

        }
        nextBtn.addEventListener('click', ()=>{
            currentIndex = (currentIndex + 1) % slide.length
            showSlide(currentIndex);
        });
        prevBtn.addEventListener('click', () =>{
            currentIndex = (currentIndex - 1 + slide.length)% slide.length;
            showSlide(currentIndex);

        });
    </script>
</body>
</html>
