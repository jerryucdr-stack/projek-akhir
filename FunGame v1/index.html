<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Pukul Alien 👽</title>
    <style>
        /* CSS untuk mempercantik tampilan game */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #282c34;
            color: white;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 40px;
        }
        h1 {
            margin-bottom: 5px;
            color: #61dafb;
        }
        .info {
            font-size: 24px;
            margin-bottom: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 10px;
        }
        /* Membuat grid 3x3 untuk lubang */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 15px;
        }
        /* Desain lubang alien */
        .hole {
            width: 100px;
            height: 100px;
            background-color: #444;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            cursor: pointer;
            box-shadow: inset 0 0 15px #000;
            user-select: none; /* Mencegah teks tersorot saat diklik cepat */
            transition: background-color 0.1s;
        }
        .hole:active {
            background-color: #555;
        }
        /* Desain tombol */
        button {
            margin-top: 40px;
            padding: 15px 30px;
            font-size: 20px;
            background-color: #e06c75;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.1s, background-color 0.2s;
        }
        button:hover {
            background-color: #c95c65;
        }
        button:active {
            transform: scale(0.95);
        }
        button:disabled {
            background-color: #777;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>

    <h1>Game Pukul Alien 👽</h1>
    <div class="info">
        Skor: <span id="skor">0</span> | Waktu: <span id="waktu">30</span>s
    </div>

    <div class="grid">
        <div class="hole" id="1"></div>
        <div class="hole" id="2"></div>
        <div class="hole" id="3"></div>
        <div class="hole" id="4"></div>
        <div class="hole" id="5"></div>
        <div class="hole" id="6"></div>
        <div class="hole" id="7"></div>
        <div class="hole" id="8"></div>
        <div class="hole" id="9"></div>
    </div>

    <button id="tombol-mulai">Mulai Bermain!</button>

    <script>
        // Logika JavaScript untuk menjalankan game
        const holes = document.querySelectorAll('.hole');
        const skorDisplay = document.querySelector('#skor');
        const waktuDisplay = document.querySelector('#waktu');
        const tombolMulai = document.querySelector('#tombol-mulai');

        let posisiAlien;
        let skor = 0;
        let waktuSisa = 30;
        let timerId = null;
        let hitungMundurTimerId = null;

        // Fungsi untuk mengosongkan semua lubang
        function hapusAlien() {
            holes.forEach(hole => {
                hole.textContent = '';
            });
        }

        // Fungsi untuk memunculkan alien di lubang acak
        function munculkanAlien() {
            hapusAlien(); // Hapus alien sebelumnya
            const randomHole = holes[Math.floor(Math.random() * 9)];
            randomHole.textContent = '👽'; // Munculkan alien
            posisiAlien = randomHole.id; // Simpan posisi alien saat ini
        }

        // Cek jika pemain berhasil memukul alien
        holes.forEach(hole => {
            hole.addEventListener('mousedown', () => {
                if (hole.id == posisiAlien) {
                    skor++;
                    skorDisplay.textContent = skor;
                    posisiAlien = null; // Reset posisi agar tidak bisa di-klik berkali-kali
                    hole.textContent = '💥'; // Berikan efek ledakan
                }
            })
        })

        // Fungsi mengatur waktu mundur
        function hitungMundur() {
            waktuSisa--;
            waktuDisplay.textContent = waktuSisa;

            if (waktuSisa === 0) {
                clearInterval(timerId);
                clearInterval(hitungMundurTimerId);
                alert('Waktu Habis! Skor akhir kamu adalah: ' + skor);
                tombolMulai.disabled = false;
                tombolMulai.textContent = "Main Lagi";
                hapusAlien();
            }
        }

        // Fungsi untuk memulai game
        function mulaiGame() {
            skor = 0;
            waktuSisa = 30;
            skorDisplay.textContent = skor;
            waktuDisplay.textContent = waktuSisa;
            tombolMulai.disabled = true;
            
            // Atur kecepatan alien muncul (700 milidetik = 0.7 detik)
            timerId = setInterval(munculkanAlien, 700); 
            hitungMundurTimerId = setInterval(hitungMundur, 1000); // Hitung mundur 1 detik
        }

        // Jalankan game saat tombol diklik
        tombolMulai.addEventListener('click', mulaiGame);
    </script>

</body>
</html>
