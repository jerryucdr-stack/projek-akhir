    <div class="kotak3">

         <select name="" id="film">

        <h3>harga</h3>

         <p id="harga">0</p>
    

    <input type="number" id="j_tiket">
    <button onclick="hitung()">Hitung</button>
    <p>Total Bayar : <span id="bayar">0</span></p>
    </select>

    <!-- </div> -->
    
    

    <script>
        let selectElement = document.getElementById('film');
        let imgElement = document.getElementById('img');       
        selectElement.addEventListener("change", function() {
            let selectValue = selectElement.value;

            if(selectValue === "film1"){
                imgElement.src = 'gambar1.png'
                harga = 50000
                sinopsis = 'Lorem, ipsum dolor sit amet consectetur adipisicing elit. Quis temporibus minus placeat officia error accusamus. Molestiae dignissimos recusandae consequuntur omnis quod? Perspiciatis ipsum quam pariatur aliquid exercitationem possimus, dolorum eum! '

                


                

            }else if (selectValue === "film2"){
                imgElement.src = 'gambar2.png'
            }else if (selectValue === "film3"){
                imgElement.src = 'gambar3.png'
            }
            const format = harga.toLocaleString('id-ID');
            document.getElementById("harga").textContent = harga;
            document.getElementById("sinopsis").textContent = sinopsis;
       } );
        function hitung(){
            let j_tiket = parseFloat(document.getElementById('j_tiket').value);
            let bayar = harga * j_tiket
            const format = bayar.toLocaleString('id-ID');
            document.getElementById('bayar').textContent =  `Rp${format}`;
            
        }


    </script>
